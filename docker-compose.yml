services:
  db:
    image: docker.io/library/postgres:18.3
    restart: unless-stopped
    command: postgres -cconfig_file=/config/postgres.conf -chba_file=/config/postgres_hba.conf
    environment:
      POSTGRES_DB: "${TELRAAM_DB}"
      POSTGRES_USER: "${TELRAAM_DB_USER}"
      POSTGRES_PASSWORD: "${TELRAAM_DB_PASSWORD}"
      PGDATA: /data/postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgresql.conf:/config/postgresql.conf:ro
      - ./postgresql_hba.conf:/config/postgresql_hba.conf:ro
      - ./data/db/:/data/postgres/
