services:
  db:
    image: docker.io/library/postgres:18.3
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${TELRAAM_DB}"
      POSTGRES_USER: "${TELRAAM_DB_USER}"
      POSTGRES_PASSWORD: "${TELRAAM_DB_PASSWORD}"
      PGDATA: /data/postgres
    ports:
      - "5432:5432"
    volumes:
      - db:/data/postgres

volumes:
  db:
