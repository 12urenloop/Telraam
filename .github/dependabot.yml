---
version: 2
updates:
- package-ecosystem: "gradle"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "saturday"
    time: "11:00"
    timezone: "Europe/Brussels"
  open-pull-requests-limit: 20

- package-ecosystem: "docker"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "saturday"
    time: "11:00"
    timezone: "Europe/Brussels"
  open-pull-requests-limit: 20

- package-ecosystem: "docker-compose"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "saturday"
    time: "11:00"
    timezone: "Europe/Brussels"
  open-pull-requests-limit: 20

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "saturday"
    time: "11:00"
    timezone: "Europe/Brussels"
  open-pull-requests-limit: 20
